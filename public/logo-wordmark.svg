<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#000000"/>

  <!--
    "EDE MARKETING" wordmark.
    The "EDE" letters are large bold slab-serif with rectangular punch-throughs.
    "MARKETING" is small, spaced below.
    Uses text with a heavy font as approximation; the rectangular punch-outs
    in E and D are replicated via clipping/overlay rectangles.
  -->

  <!-- === E (left) === -->
  <!-- Spine -->
  <rect x="60"  y="70" width="28" height="140" fill="white"/>
  <!-- Top bar -->
  <rect x="60"  y="70" width="90" height="30"  fill="white"/>
  <!-- Mid bar -->
  <rect x="60" y="131" width="72" height="26"  fill="white"/>
  <!-- Bottom bar -->
  <rect x="60" y="180" width="90" height="30"  fill="white"/>
  <!-- Black punch-outs (the square holes visible in the original) -->
  <rect x="88"  y="100" width="36" height="31"  fill="black"/>
  <rect x="88"  y="157" width="28" height="23"  fill="black"/>

  <!-- === D (center) === -->
  <!-- Spine -->
  <rect x="200" y="70" width="28" height="140" fill="white"/>
  <!-- Top cap -->
  <rect x="200" y="70"  width="60" height="30"  fill="white"/>
  <!-- Bottom cap -->
  <rect x="200" y="180" width="60" height="30"  fill="white"/>
  <!-- Curved right body -->
  <path d="M260 100 Q330 140 260 180 Z" fill="white"/>
  <rect x="257" y="100" width="18" height="80" fill="white"/>
  <!-- Inner cutout -->
  <path d="M228 118 Q280 140 228 162 Z" fill="black"/>
  <rect x="228" y="118" width="28" height="44" fill="black"/>

  <!-- === E (right) === -->
  <!-- Spine -->
  <rect x="372" y="70" width="28" height="140" fill="white"/>
  <!-- Top bar -->
  <rect x="372" y="70"  width="90" height="30" fill="white"/>
  <!-- Mid bar -->
  <rect x="372" y="131" width="72" height="26" fill="white"/>
  <!-- Bottom bar -->
  <rect x="372" y="180" width="90" height="30" fill="white"/>
  <!-- Black punch-outs -->
  <rect x="400" y="100" width="36" height="31" fill="black"/>
  <rect x="400" y="157" width="28" height="23" fill="black"/>

  <!-- === "MARKETING" text below === -->
  <text
    x="300"
    y="245"
    fill="white"
    font-family="Arial, sans-serif"
    font-size="26"
    font-weight="400"
    letter-spacing="10"
    text-anchor="middle"
  >MARKETING</text>

  <!-- 4-pointed star / diamond (bottom-right) -->
  <g transform="translate(572,275)">
    <polygon points="0,-8 2.5,-2.5 8,0 2.5,2.5 0,8 -2.5,2.5 -8,0 -2.5,-2.5" fill="#777"/>
  </g>
</svg>
